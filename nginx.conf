server {
    listen $PORT;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html (required for React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets forever (Vite adds content hashes to filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml;
}
