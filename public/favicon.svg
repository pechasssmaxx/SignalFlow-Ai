<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Outer glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Core burst glow -->
    <filter id="core" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001a00"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" fill="url(#bg)"/>

  <!-- Outer segmented ring -->
  <circle cx="16" cy="16" r="14"
    fill="none" stroke="#1a6b2a" stroke-width="1.5"
    stroke-dasharray="3.5 1.8" stroke-linecap="round"
    filter="url(#glow)"/>

  <!-- Inner segmented ring -->
  <circle cx="16" cy="16" r="10"
    fill="none" stroke="#22a83a" stroke-width="1.2"
    stroke-dasharray="2.5 1.5" stroke-linecap="round"
    filter="url(#glow)"/>

  <!-- Innermost ring -->
  <circle cx="16" cy="16" r="6.5"
    fill="none" stroke="#2ecc50" stroke-width="1"
    filter="url(#glow)"/>

  <!-- Star burst rays -->
  <g filter="url(#core)" opacity="0.9">
    <line x1="16" y1="11" x2="16" y2="21" stroke="#7fff7f" stroke-width="0.7"/>
    <line x1="11" y1="16" x2="21" y2="16" stroke="#7fff7f" stroke-width="0.7"/>
    <line x1="12.5" y1="12.5" x2="19.5" y2="19.5" stroke="#7fff7f" stroke-width="0.5"/>
    <line x1="19.5" y1="12.5" x2="12.5" y2="19.5" stroke="#7fff7f" stroke-width="0.5"/>
  </g>

  <!-- Core dot -->
  <circle cx="16" cy="16" r="2.5" fill="#ffffff" filter="url(#core)"/>
  <circle cx="16" cy="16" r="1.5" fill="#aaffaa"/>
</svg>
